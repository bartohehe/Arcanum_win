<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Arcanum">
  <title>Arcanum</title>

  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Yuji+Boku&amp;family=Yuji+Mai&amp;family=Yuji+Syuku&amp;display=swap');</style>
    <radialGradient id="sealFace" cx="32%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#d97048"></stop>
      <stop offset="55%" stop-color="#b85530"></stop>
      <stop offset="100%" stop-color="#8a3418"></stop>
    </radialGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.8" numOctaves="2" seed="9"></feTurbulence>
      <feColorMatrix values="0 0 0 0 0.15  0 0 0 0 0.08  0 0 0 0 0.04  0 0 0 0.22 0"></feColorMatrix>
      <feComposite in2="SourceGraphic" operator="in"></feComposite>
    </filter>
    <clipPath id="sealClip">
      <rect x="14" y="14" width="212" height="212" rx="60" ry="60"></rect>
    </clipPath>
  </defs>

  
  <rect x="6" y="6" width="228" height="228" rx="68" ry="68" fill="#6b2410"></rect>

  
  <g clip-path="url(#sealClip)">
    <rect x="14" y="14" width="212" height="212" fill="url(#sealFace)"></rect>
    <rect x="14" y="14" width="212" height="212" filter="url(#grain)" opacity="0.6"></rect>
  </g>

  
  <rect x="22" y="22" width="196" height="196" rx="54" ry="54" fill="none" stroke="#fbf3df" stroke-opacity="0.28" stroke-width="1.5"></rect>

  
  <text x="120" y="124" text-anchor="middle" dominant-baseline="central" font-family="&#39;Yuji Boku&#39;, &#39;Yuji Mai&#39;, &#39;Yuji Syuku&#39;, &#39;Klee One&#39;, &#39;Hina Mincho&#39;, &#39;Hiragino Mincho ProN&#39;, serif" font-weight="400" font-size="160" fill="#fbf3df">気</text>
</svg>